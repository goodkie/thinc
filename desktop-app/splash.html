<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:500px; height:340px;
    background:transparent;
    overflow:hidden;
    font-family:'Segoe UI',system-ui,sans-serif;
    -webkit-app-region: drag;
    user-select:none;
  }
  .card {
    width:100%; height:100%;
    background: linear-gradient(135deg, #0a0a1a 0%, #0f0f2a 40%, #1a0a2e 100%);
    border-radius:18px;
    border:1px solid rgba(139,92,246,0.35);
    box-shadow:0 0 60px rgba(139,92,246,0.25), 0 0 120px rgba(59,130,246,0.1);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:18px;
    position:relative; overflow:hidden;
  }
  .card::before {
    content:'';
    position:absolute; top:-50%; left:-50%;
    width:200%; height:200%;
    background: conic-gradient(from 0deg at 50% 50%, transparent 0deg, rgba(139,92,246,0.06) 90deg, transparent 180deg);
    animation: rotate 8s linear infinite;
  }
  @keyframes rotate { to { transform:rotate(360deg); } }
  .logo-wrap {
    position:relative; z-index:2;
    width:96px; height:96px;
    display:flex; align-items:center; justify-content:center;
  }
  .logo-ring {
    position:absolute; inset:0;
    border-radius:50%;
    border:2px solid transparent;
    background: linear-gradient(#0a0a1a,#0a0a1a) padding-box,
                linear-gradient(135deg,#8b5cf6,#3b82f6,#06b6d4) border-box;
    animation: spin 3s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .logo-img { width:72px; height:72px; border-radius:50%; position:relative; z-index:1; }
  .title-block { position:relative; z-index:2; text-align:center; }
  .title { font-size:22px; font-weight:800; letter-spacing:0.05em;
    background:linear-gradient(135deg,#c084fc,#818cf8,#38bdf8);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .subtitle { font-size:11px; color:rgba(148,163,184,0.7); letter-spacing:0.18em; margin-top:4px; text-transform:uppercase; }
  .bar-wrap { position:relative; z-index:2; width:260px; }
  .bar-bg { height:3px; background:rgba(255,255,255,0.07); border-radius:4px; overflow:hidden; }
  .bar-fill {
    height:100%;
    background:linear-gradient(90deg,#8b5cf6,#3b82f6,#06b6d4);
    border-radius:4px;
    width:0%;
    animation: load 2.2s ease-out forwards;
  }
  @keyframes load { 0%{width:0%} 60%{width:70%} 85%{width:88%} 100%{width:100%} }
  .ver { position:relative; z-index:2; font-size:10px; color:rgba(148,163,184,0.4); letter-spacing:0.1em; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <img class="logo-img" src="thinc-logo-new.png" onerror="this.style.display='none'">
    </div>
    <div class="title-block">
      <div class="title">The Truth Untold</div>
      <div class="subtitle">Th!nc Biometric Lie Detector</div>
    </div>
    <div class="bar-wrap">
      <div class="bar-bg"><div class="bar-fill"></div></div>
    </div>
    <div class="ver">v1.5.2 &nbsp;|&nbsp; Desktop Edition</div>
  </div>
</body>
</html>
