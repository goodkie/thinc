<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Th!nc</title>
  <style>
    body {
      background-color: #050510;
      margin: 0;
      padding: 0;
    }
  </style>
  <script>
    (function() {
      // 1. Immediate Device Detection
      const ua = navigator.userAgent;
      const touchSupport = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
      const isMobile = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua) || (touchSupport && window.innerWidth < 1024);
      const targetPage = isMobile ? '/mobile.html' : '/desktop.html';
      const targetUrl = new URL(targetPage + window.location.search, window.location.origin).href;
      
      // 2. Handle Iframe / Masked Forwarding Safely
      try {
        if (window.self !== window.top) {
          // If in iframe, try to redirect the top-level page
          window.top.location.replace(targetUrl);
        } else {
          window.location.replace(targetUrl);
        }
      } catch (e) {
        // Fallback inside iframe if cross-origin policy blocks top navigation
        window.location.replace(targetUrl);
      }
    })();
  </script>
</head>
<body>
</body>
</html>
